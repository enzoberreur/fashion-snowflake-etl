# Pre-commit hooks. Run `pre-commit install` once; checks then run on each commit.
# Run across the whole repo at any time with `pre-commit run --all-files`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff          # lint, autofix what it safely can
        args: [--fix]
      - id: ruff-format   # formatter

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
